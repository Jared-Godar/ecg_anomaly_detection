name: Quality gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment:
    name: Locked environment and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Create locked environment
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest

      - name: Run type checks
        run: uv run pyright

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Run repository checks
        env:
          # A dedicated job below performs the full-history secret scan.
          # no-commit-to-branch guards local developer commits directly to
          # main; it provides no protective value in CI, which only ever
          # checks out an existing commit and can't "commit" anything, and
          # it unconditionally fails on the push-to-main trigger since that
          # trigger's checked-out branch legitimately is main. Skipped here
          # only -- .pre-commit-config.yaml still enforces it for every
          # local `pre-commit run` and `git commit`.
          SKIP: gitleaks,pyright,no-commit-to-branch
        run: uvx --from pre-commit==4.6.0 pre-commit run --all-files --show-diff-on-failure

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan Git history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_VERSION: 8.30.1

  package-build:
    name: Build package artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Build-only assurance check: confirms the package builds cleanly with
      # every proposed change. Never uploads or publishes anywhere -- package
      # publication remains a separate, explicitly reviewed decision per
      # docs/governance/releases.md.
      - name: Build wheel and source distribution
        run: uv build

      - name: Verify built artifacts exist
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl')" || {
            echo "::error::no wheel produced under dist/"
            exit 1
          }
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz')" || {
            echo "::error::no source distribution produced under dist/"
            exit 1
          }

      - name: Confirm built artifacts are not tracked in Git
        run: |
          tracked=$(git ls-files dist)
          if [[ -n "$tracked" ]]; then
            echo "::error::built package artifacts must not be committed:"
            echo "$tracked"
            exit 1
          fi
