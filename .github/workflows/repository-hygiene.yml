name: Repository hygiene

on:
  schedule:
    # 06:00 UTC every Monday. Cron is UTC-only; there is no timezone config.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  label-drift:
    name: Detect label drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Create locked environment
        run: uv sync --locked --dev

      - name: Detect labels applied to open issues/PRs that are off the canonical manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/detect_label_drift.py --repo "${{ github.repository }}"

  held-out-trigger-safety:
    name: Check held-out execution trigger safety
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Create locked environment
        run: uv sync --locked --dev

      - name: Verify no workflow can trigger a held-out execution on routine push/PR events
        run: |
          uv run python scripts/check_held_out_trigger_safety.py

  privileged-workflow-safety:
    name: Check privileged workflow safety
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Create locked environment
        run: uv sync --locked --dev

      - name: Verify every pull_request_target workflow preserves its safety invariants
        run: |
          uv run python scripts/check_privileged_workflow_safety.py
