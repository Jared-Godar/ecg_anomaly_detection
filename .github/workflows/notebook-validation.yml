name: Curated notebook validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notebook-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-notebooks:
    name: Execute curated notebooks without the full dataset
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true

      - name: Create locked environment
        run: uv sync --locked --group notebooks --group dev

      # Runs the three curated public notebooks end to end in an isolated git
      # worktree, seeded with a small synthetic WFDB record set and a matching
      # acquisition manifest -- never the real MIT-BIH dataset. See
      # scripts/validate_curated_notebooks.py for the full mechanism.
      - name: Validate curated notebooks
        run: uv run python scripts/validate_curated_notebooks.py
