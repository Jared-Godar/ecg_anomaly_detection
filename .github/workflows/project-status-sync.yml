name: Project status sync

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: project-status-sync-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  set-merged-status:
    name: Force Project #5 status to Merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Create locked environment
        run: uv sync --locked --dev

      # A merged pull request also closes it, so GitHub Project's built-in
      # "Pull request merged" and "Item closed" workflows race on the same
      # event and "Closed" has consistently won -- see
      # docs/governance/github-project.md#automation. This step wins the
      # race explicitly, after the fact.
      #
      # PROJECT_METADATA_TOKEN is a CLASSIC PAT (scopes: project + public_repo
      # + read:org); fine-grained tokens cannot access user-owned Projects --
      # see docs/governance/github-metadata-automation.md. The `project` scope
      # is read-and-write, which this step needs; metadata-governance.yml uses
      # the same secret read-only, so one token covers both.
      - name: Set Project #5 status to Merged
        env:
          GH_TOKEN: ${{ secrets.PROJECT_METADATA_TOKEN }}
        run: |
          uv run python scripts/github/set_merged_project_status.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"
