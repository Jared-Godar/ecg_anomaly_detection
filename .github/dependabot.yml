version: 2

# Labels below must exist in the repo taxonomy (.github/labels.json /
# docs/governance/label-taxonomy.md): Dependabot silently SKIPS unknown
# labels rather than creating them, which is how PR #192 arrived label-less
# under the legacy [dependencies, automation] pair. The metadata gate
# requires BOTH a type:* and an area:* label on every PR, so each entry
# carries an area label matched to what that ecosystem touches.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    labels: ["dependency: external", "type: maintenance", "area: ci-cd"]
    assignees: ["Jared-Godar"]

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 7
    groups:
      pre-commit-hooks:
        patterns: ["*"]
    labels: ["dependency: external", "type: maintenance", "area: quality"]
    assignees: ["Jared-Godar"]
