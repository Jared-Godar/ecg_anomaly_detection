version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies, automation]

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 7
    groups:
      pre-commit-hooks:
        patterns: ["*"]
    labels: [dependencies, automation]
