<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Modern supported ECG pipeline and evidence lineage</title>
  <desc id="desc">Versioned configuration controls package-backed stages from acquisition through validation-only evaluation. Generated evidence and artifacts feed an auditable run manifest. The test partition remains protected.</desc>
  <style>
    .background { fill: #f8fafc; }
    .stage { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .control { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; }
    .evidence { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
    .protected { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; stroke-dasharray: 8 6; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 16px; fill: #0f172a; text-anchor: middle; }
    .small { font-size: 14px; }
    .heading { font-size: 22px; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="background" width="1200" height="520" rx="16"/>
  <text class="label heading" x="600" y="42">Supported modern workflow</text>

  <rect class="control" x="30" y="75" width="1140" height="62" rx="10"/>
  <text class="label" x="600" y="101">Versioned configuration + tested package contracts + CLI orchestration</text>
  <text class="label small" x="600" y="124">Repository-owned control plane; no transformation logic lives in the notebook</text>

  <rect class="stage" x="30" y="190" width="145" height="70" rx="10"/>
  <rect class="stage" x="205" y="190" width="145" height="70" rx="10"/>
  <rect class="stage" x="380" y="190" width="145" height="70" rx="10"/>
  <rect class="stage" x="555" y="190" width="145" height="70" rx="10"/>
  <rect class="stage" x="730" y="190" width="145" height="70" rx="10"/>
  <rect class="stage" x="905" y="190" width="145" height="70" rx="10"/>
  <text class="label" x="102" y="220">Acquire +</text><text class="label" x="102" y="242">inventory</text>
  <text class="label" x="277" y="220">Validate +</text><text class="label" x="277" y="242">map</text>
  <text class="label" x="452" y="220">Extract</text><text class="label" x="452" y="242">windows</text>
  <text class="label" x="627" y="220">Subject-aware</text><text class="label" x="627" y="242">split + index</text>
  <text class="label" x="802" y="220">Train on</text><text class="label" x="802" y="242">training only</text>
  <text class="label" x="977" y="220">Evaluate on</text><text class="label" x="977" y="242">validation only</text>
  <path class="line" d="M175 225 H205"/><path class="line" d="M350 225 H380"/><path class="line" d="M525 225 H555"/>
  <path class="line" d="M700 225 H730"/><path class="line" d="M875 225 H905"/>
  <path class="line" d="M600 137 V180"/>

  <rect class="protected" x="1075" y="190" width="95" height="70" rx="10"/>
  <text class="label small" x="1122" y="216">Test</text><text class="label small" x="1122" y="236">partition</text><text class="label small" x="1122" y="254">unopened</text>

  <rect class="evidence" x="125" y="330" width="950" height="72" rx="10"/>
  <text class="label" x="600" y="359">Generated operational and reproducibility evidence</text>
  <text class="label small" x="600" y="384">validation reports · split diagnostics · digests · environment · runtime · resources · validation metrics</text>
  <path class="line" d="M600 260 V320"/>

  <rect class="evidence" x="390" y="442" width="420" height="52" rx="10"/>
  <text class="label" x="600" y="475">Auditable run manifest and artifact lineage</text>
  <path class="line" d="M600 402 V432"/>
</svg>
