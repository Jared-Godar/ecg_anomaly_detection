<text xml:space="preserve" text-anchor="start" x="13" y="-36.55" font-family="Helvetica,Arial,sans-serif" font-weight="bold" font-size="11.00" fill="#000000">Implemented Pipeline Overview.</text>
<text xml:space="preserve" text-anchor="start" x="179.5" y="-36.55" font-family="Helvetica,Arial,sans-serif" font-size="11.00" fill="#000000"> The supported workflow runs locally and in order: heartbeat recordings</text>
<text xml:space="preserve" text-anchor="start" x="13" y="-25.55" font-family="Helvetica,Arial,sans-serif" font-size="11.00" fill="#000000">are downloaded and checked, organized into labeled training windows, and split by subject. A baseline model</text>
<text xml:space="preserve" text-anchor="start" x="13" y="-14.55" font-family="Helvetica,Arial,sans-serif" font-size="11.00" fill="#000000">is trained and scored only on the validation portion, and a run manifest records exactly what ran.</text>
<polygon fill="none" stroke="#8a8f98" points="0,0 0,-59 545.75,-59 545.75,0 0,0"/>
</g>
</g>
