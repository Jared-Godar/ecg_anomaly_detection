config:
  # Prose and tables are intentionally optimized for rendered readability.
  MD013: false
  MD060: false
  # CHANGELOG.md repeats "### Added"/"### Changed"/etc. under every version
  # heading, per Keep a Changelog convention. siblings_only only flags
  # duplicate headings that are true siblings (same parent), not the same
  # subheading repeated under different version sections.
  MD024:
    siblings_only: true

globs:
  - "**/*.md"
  - "!archive/original_2022/**"
  - "!.venv/**"
  # Gitignored artifacts directory contains session handoffs and generated
  # reports that are not tracked content; exclude from lint.
  - "!artifacts/**"
  # Tool-local AI assistant / coding-agent files are gitignored (see
  # .gitignore's matching configuration section), but markdownlint-cli2 scans
  # the filesystem without consulting Git. Exclude local files here while
  # retaining explicitly approved project instructions below.
  - "!.amazonq/**"
  - "!.codex/**"
  - "!.claude/**"
  - ".claude/CLAUDE.md"
  - "!.cursor/**"
  - "!.github-copilot/**"
  - "!.continue/**"
