config:
  # Prose and tables are intentionally optimized for rendered readability.
  MD013: false
  MD060: false
  # CHANGELOG.md repeats "### Added"/"### Changed"/etc. under every version
  # heading, per Keep a Changelog convention. siblings_only only flags
  # duplicate headings that are true siblings (same parent), not the same
  # subheading repeated under different version sections.
  MD024:
    siblings_only: true

globs:
  - "**/*.md"
  - "!archive/original_2022/**"
  - "!.venv/**"
  # Local AI assistant / coding-agent configuration -- gitignored (see
  # .gitignore's "Local AI assistant / coding-agent configuration" section)
  # but not respected by markdownlint-cli2's own glob scan, which reads the
  # filesystem directly rather than consulting Git. Keep this list in sync
  # with that .gitignore section.
  - "!.amazonq/**"
  - "!.codex/**"
  - "!.claude/**"
  - "!.cursor/**"
  - "!.github-copilot/**"
  - "!.continue/**"
